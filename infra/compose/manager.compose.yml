      org.rvc-orchestrator.component: manager
  redis_data:
    labels:
      org.rvc-orchestrator.component: manager
  minio_data:
    labels:
      org.rvc-orchestrator.component: manager
  artifact_spool:
    labels:
      org.rvc-orchestrator.component: manager-transient
  dataset_ingestion:
    labels:
      org.rvc-orchestrator.component: manager-transient
  api_runtime_secrets:
    labels:
      org.rvc-orchestrator.component: manager-sensitive-runtime
  maintenance_runtime_secrets:
    labels:
