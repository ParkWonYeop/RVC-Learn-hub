  minio_root_password:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/minio_root_password
  minio_app_access_key:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/minio_app_access_key
  minio_app_secret_key:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/minio_app_secret_key
  maintenance_s3_access_key:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/maintenance_s3_access_key
  maintenance_s3_secret_key:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/maintenance_s3_secret_key
  mlflow_s3_access_key:
