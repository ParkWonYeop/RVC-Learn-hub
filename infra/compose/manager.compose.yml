  mlflow_postgres_password:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/mlflow_postgres_password
  redis_password:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/redis_password
  maintenance_redis_password:
    file: ${MANAGER_SECRETS_DIR:?MANAGER_SECRETS_DIR must be set}/maintenance_redis_password
  minio_root_user:
