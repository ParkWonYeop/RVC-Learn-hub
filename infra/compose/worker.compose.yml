name: ${WORKER_COMPOSE_PROJECT_NAME:-rvc-orchestrator-worker}

services:
  worker:
    image: ${WORKER_IMAGE:-rvc-orchestrator-worker:dev}
    pull_policy: ${RVC_IMAGE_PULL_POLICY:-missing}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      MANAGER_URL: ${MANAGER_URL:?MANAGER_URL must be set}
      WORKER_NAME: ${WORKER_NAME:?WORKER_NAME must be set}
      WORKER_TOKEN_FILE: /run/secrets/worker_token
      WORKER_CA_BUNDLE_PATH: ${WORKER_CA_BUNDLE_PATH:-}
      DATA_ROOT: /var/lib/rvc-worker
      RVC_RUNNER_MODE: ${RVC_RUNNER_MODE:-fake}
      RVC_PROFILE_PATH: /etc/rvc-worker/rvc-profile.yaml
      RVC_NATIVE_SOURCE_ROOT: ${RVC_NATIVE_SOURCE_ROOT:-/opt/rvc-webui}
      RVC_NATIVE_PYTHON_EXECUTABLE: ${RVC_NATIVE_PYTHON_EXECUTABLE:-/opt/conda/bin/python}
      RVC_NATIVE_CPU_WORKERS: ${RVC_NATIVE_CPU_WORKERS:-2}
      RVC_NATIVE_DEVICE: ${RVC_NATIVE_DEVICE:-cuda}
      RVC_NATIVE_USE_HALF: ${RVC_NATIVE_USE_HALF:-true}
      RVC_NATIVE_PREPROCESS_TIMEOUT_SECONDS: ${RVC_NATIVE_PREPROCESS_TIMEOUT_SECONDS:-3600}
      RVC_NATIVE_EXTRACTION_TIMEOUT_SECONDS: ${RVC_NATIVE_EXTRACTION_TIMEOUT_SECONDS:-7200}
      RVC_NATIVE_TRAINING_TIMEOUT_SECONDS: ${RVC_NATIVE_TRAINING_TIMEOUT_SECONDS:-604800}
      RVC_NATIVE_INDEX_TIMEOUT_SECONDS: ${RVC_NATIVE_INDEX_TIMEOUT_SECONDS:-86400}
      RVC_NATIVE_SMALL_MODEL_TIMEOUT_SECONDS: ${RVC_NATIVE_SMALL_MODEL_TIMEOUT_SECONDS:-3600}
      RVC_GPU_SMOKE_VERIFIED: ${RVC_GPU_SMOKE_VERIFIED:-false}
      RVC_PROFILE_STAGE_SET_VERIFIED: ${RVC_PROFILE_STAGE_SET_VERIFIED:-false}
      RVC_NATIVE_UNVERIFIED_GPU_ACKNOWLEDGED: ${RVC_NATIVE_UNVERIFIED_GPU_ACKNOWLEDGED:-false}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
      SYSTEM_TELEMETRY_INTERVAL_SECONDS: ${SYSTEM_TELEMETRY_INTERVAL_SECONDS:-60}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      LEASE_RENEW_INTERVAL_SECONDS: ${LEASE_RENEW_INTERVAL_SECONDS:-30}
      TELEMETRY_SPOOL_MAX_BYTES: ${TELEMETRY_SPOOL_MAX_BYTES:-268435456}
      ARTIFACT_UPLOAD_TIMEOUT_SECONDS: ${ARTIFACT_UPLOAD_TIMEOUT_SECONDS:-3600}
      ARTIFACT_UPLOAD_MAX_ATTEMPTS: ${ARTIFACT_UPLOAD_MAX_ATTEMPTS:-3}
      ARTIFACT_MAX_OBJECT_BYTES: ${ARTIFACT_MAX_OBJECT_BYTES:-5368709120}
      ARTIFACT_MAX_FILES_PER_ATTEMPT: ${ARTIFACT_MAX_FILES_PER_ATTEMPT:-256}
      ARTIFACT_MAX_TOTAL_BYTES_PER_ATTEMPT: ${ARTIFACT_MAX_TOTAL_BYTES_PER_ATTEMPT:-107374182400}
      ARTIFACT_CHECKPOINT_RETENTION: ${ARTIFACT_CHECKPOINT_RETENTION:-20}
      DATASET_DOWNLOAD_TIMEOUT_SECONDS: ${DATASET_DOWNLOAD_TIMEOUT_SECONDS:-3600}
      DATASET_DOWNLOAD_MAX_ATTEMPTS: ${DATASET_DOWNLOAD_MAX_ATTEMPTS:-3}
      DATASET_MAX_ARCHIVE_BYTES: ${DATASET_MAX_ARCHIVE_BYTES:-5368709120}
      DATASET_MAX_ENTRIES: ${DATASET_MAX_ENTRIES:-10000}
      DATASET_MAX_FILE_BYTES: ${DATASET_MAX_FILE_BYTES:-2147483648}
      DATASET_MAX_TOTAL_BYTES: ${DATASET_MAX_TOTAL_BYTES:-21474836480}
      DATASET_MAX_COMPRESSION_RATIO: ${DATASET_MAX_COMPRESSION_RATIO:-200}
      TEST_SET_DOWNLOAD_TIMEOUT_SECONDS: ${TEST_SET_DOWNLOAD_TIMEOUT_SECONDS:-3600}
      TEST_SET_MATERIALIZATION_TIMEOUT_SECONDS: ${TEST_SET_MATERIALIZATION_TIMEOUT_SECONDS:-7200}
      TEST_SET_DOWNLOAD_MAX_ATTEMPTS: ${TEST_SET_DOWNLOAD_MAX_ATTEMPTS:-3}
      TEST_SET_MAX_ITEMS: ${TEST_SET_MAX_ITEMS:-128}
      TEST_SET_MAX_ITEM_BYTES: ${TEST_SET_MAX_ITEM_BYTES:-268435456}
      TEST_SET_MAX_TOTAL_BYTES: ${TEST_SET_MAX_TOTAL_BYTES:-2147483648}
      TEST_SET_MAX_DURATION_SECONDS: ${TEST_SET_MAX_DURATION_SECONDS:-600}
      TEST_SET_MAX_TOTAL_DURATION_SECONDS: ${TEST_SET_MAX_TOTAL_DURATION_SECONDS:-3600}
      TEST_SET_MIN_SAMPLE_RATE_HZ: ${TEST_SET_MIN_SAMPLE_RATE_HZ:-8000}
      TEST_SET_MAX_SAMPLE_RATE_HZ: ${TEST_SET_MAX_SAMPLE_RATE_HZ:-192000}
      TEST_SET_MAX_CHANNELS: ${TEST_SET_MAX_CHANNELS:-2}
      TEST_SET_DURATION_TOLERANCE_SECONDS: ${TEST_SET_DURATION_TOLERANCE_SECONDS:-0.000001}
    secrets:
      - worker_token
    volumes:
      - ${WORKER_DATA_ROOT:-/var/lib/rvc-orchestrator/worker}:/var/lib/rvc-worker
      - ${WORKER_RVC_PROFILE_HOST_PATH:-/etc/rvc-orchestrator/worker/rvc-profile.yaml}:/etc/rvc-worker/rvc-profile.yaml:ro
      - ${WORKER_CA_BUNDLE_HOST_DIR:-/etc/rvc-orchestrator/worker/ca}:/etc/rvc-worker/ca:ro
      - ../worker/runtime/runtime-activation.json:/run/rvc-release/runtime-activation.json:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    gpus: all
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD", "python", "-m", "rvc_worker", "--check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

secrets:
  worker_token:
    file: ${WORKER_SECRETS_DIR:?WORKER_SECRETS_DIR must be set}/worker_token
