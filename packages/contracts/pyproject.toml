[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[project]
name = "rvc-orchestrator-contracts"
version = "0.1.0"
description = "Versioned Manager/Worker contracts for RVC Training Orchestrator"
requires-python = ">=3.11,<3.14"
dependencies = [
  "pydantic>=2.10,<3",
]

[project.optional-dependencies]
test = [
  "pytest>=8.3,<9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rvc_orchestrator_contracts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

